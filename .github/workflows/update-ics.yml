name: Atualizar agenda do MorumBIS

on:
  schedule:
    # Todos os dias às 06:00 UTC (≈ 03:00 horário de São Paulo).
    # Ajuste o horário se quiser atualizar com outra frequência.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # permite rodar manualmente na aba "Actions"

permissions:
  contents: write

jobs:
  update-ics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar scraper e gerar morumbis.ics
        run: python build_ics.py --output morumbis.ics

      - name: Commitar e publicar o .ics atualizado (se houve mudança)
        run: |
          git config user.name "morumbi-ical-bot"
          git config user.email "actions@users.noreply.github.com"
          git add morumbis.ics
          if git diff --cached --quiet; then
            echo "Sem mudanças na agenda — nada para commitar."
          else
            git commit -m "Atualiza agenda do MorumBIS [bot]"
            git push
          fi
